name: Keep Render App Awake

on:
  schedule:
    # Runs every 14 minutes to prevent Render's 15-minute inactivity sleep
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Health Endpoint
        run: |
          # Replace 'YOUR_APP' with your actual Render service name/URL
          # e.g., https://persona-ai-demo.onrender.com/api/health
          curl -sSf https://YOUR_APP.onrender.com/api/health > /dev/null
          echo "Ping successful!"
