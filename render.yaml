services:
  - type: web
    name: persona-ai
    env: python
    region: oregon # Or your preferred region
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1 --threads 4 --worker-class gthread --log-level info"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.2
      - key: FLASK_ENV
        value: production
